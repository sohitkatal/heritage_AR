<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Heritage AR</title>

<link rel="stylesheet" href="css/style.css">

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

</head>

<body>


<div id="particles"></div>


<header>

<div class="logo">Heritage AR</div>

<nav>
<a href="#">Home</a>
<a href="#featured">Featured</a>
<a href="about.html">About</a>
<a href="ar.html">AR</a>
</nav>

</header>



<section class="hero">

<h1>Explore World Monuments</h1>

<p>Interactive 3D + Augmented Reality learning system</p>

<input type="text" id="searchBox" placeholder="Search monument...">

</section>

<div id="arInstructions">

<p>
Move your phone slowly to detect a surface.
Tap the screen to place the monument.
</p>

</div>

<section id="viewer">

<div id="viewerContainer">

<model-viewer
id="modelViewer"
camera-controls
auto-rotate
ar
ar-modes="webxr scene-viewer quick-look"
ar-scale="auto"
environment-image="neutral"
shadow-intensity="1"
style="width:100%;height:500px;display:none;">

<button slot="ar-button" class="ar-btn">
📱 View in AR
</button>

</model-viewer>

<div id="sketchfabViewer" style="display:none;"></div>

</div>

<div id="info"></div>

</section>



<section id="featured">

<h2>Featured Monuments</h2>

<div id="featuredList"></div>

</section>



<footer>

Heritage AR • Immersive Monument Explorer

</footer>


<script src="js/desktop-viewer.js"></script>
<script src="js/particles.js"></script>

</body>

</html>
