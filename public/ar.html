<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>AR Monument Viewer</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>

*{
margin:0;
padding:0;
}

body{
width:100%;
height:100vh;
background:#000;
overflow:hidden;
font-family:Arial, Helvetica, sans-serif;
}

#arContainer{
width:100%;
height:100%;
position:relative;
}

model-viewer{
width:100%;
height:100%;
background:#000;
}

.back-btn{
position:absolute;
top:20px;
left:20px;
background:#667eea;
border:none;
padding:10px 20px;
border-radius:6px;
color:white;
font-weight:600;
cursor:pointer;
z-index:100;
}

.back-btn:hover{
background:#5568d3;
}

.controls{
position:absolute;
bottom:30px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:10px;
z-index:100;
}

.btn{
background:#667eea;
border:none;
padding:10px 18px;
border-radius:6px;
color:white;
font-weight:600;
cursor:pointer;
}

.btn:hover{
background:#5568d3;
}

.info{
position:absolute;
top:20px;
right:20px;
background:rgba(0,0,0,0.7);
color:white;
padding:15px;
border-radius:6px;
max-width:240px;
}

.loading{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
text-align:center;
}

</style>

</head>

<body>

<div id="arContainer">

<button class="back-btn" onclick="goBack()">← Back</button>

<div class="info">
<strong id="monumentName">Loading...</strong>
<p id="monumentLocation" style="font-size:12px;color:#ccc;margin-top:5px;"></p>
</div>

<model-viewer
id="modelViewer"
camera-controls
auto-rotate
ar
ar-placement="floor"
ar-modes="webxr scene-viewer quick-look"
ar-scale="auto"
environment-image="neutral"
shadow-intensity="1"> </model-viewer>

<div class="loading" id="loadingMsg">
<p>⏳ Loading Monument...</p>
</div>

<div class="controls">
<button class="btn" onclick="toggleRotate()">🔄 Auto Rotate</button>
<button class="btn" onclick="resetView()">📷 Reset</button>
<button class="btn" onclick="activateAR()">📍 Place AR</button>
</div>

</div>

<script>

let modelViewer;
let monumentData;
let isAutoRotating=true;

window.addEventListener("DOMContentLoaded",async()=>{

modelViewer=document.getElementById("modelViewer");

const params=new URLSearchParams(window.location.search);

const monumentName=params.get("monument");
const modelFile=params.get("model");

if(!modelFile){
document.getElementById("loadingMsg").innerHTML="❌ No model specified";
return;
}

try{

const response=await fetch("/data/monuments.json");

const monuments=await response.json();

monumentData=monuments.find(m=>m.name===decodeURIComponent(monumentName));

if(monumentData){

document.getElementById("monumentName").textContent=monumentData.name;

document.getElementById("monumentLocation").textContent=`📍 ${monumentData.location}`;

}

const modelPath=`/models/${modelFile}`;

console.log("Loading:",modelPath);

modelViewer.src=modelPath;

modelViewer.addEventListener("load",()=>{

document.getElementById("loadingMsg").style.display="none";

});

modelViewer.addEventListener("error",()=>{

document.getElementById("loadingMsg").innerHTML="❌ Failed to load model";

});

}

catch(error){

console.error(error);

document.getElementById("loadingMsg").innerHTML="❌ Error loading";

}

});

function toggleRotate(){

isAutoRotating=!isAutoRotating;

if(isAutoRotating){

modelViewer.setAttribute("auto-rotate","");

}

else{

modelViewer.removeAttribute("auto-rotate");

}

}

function resetView(){

modelViewer.setAttribute("camera-orbit","0deg 90deg 2.5m");

}

function activateAR(){

const viewer=document.getElementById("modelViewer");

try{

viewer.activateAR();

}

catch(err){

alert("AR not supported on this device/browser.");

console.error(err);

}

}

function goBack(){

window.location.href="/ar-select.html";

}

</script>

</body>

</html>
