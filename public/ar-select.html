<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Mode - Select Monument</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: white; 
            font-family: 'Inter', sans-serif; 
        }
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px 40px; 
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .logo { 
            font-size: 24px; 
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        nav a { 
            margin-left: 25px; 
            text-decoration: none; 
            color: #cbd5e1; 
            font-weight: 600;
            transition: 0.3s;
        }
        nav a:hover { color: #667eea; }
        .hero { 
            padding: 80px 20px; 
            text-align: center; 
            background: linear-gradient(180deg, rgba(102, 126, 234, 0.1) 0%, transparent 100%);
        }
        .hero h1 { 
            font-size: 42px; 
            margin-bottom: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero p { 
            color: #cbd5e1; 
            margin-bottom: 30px; 
            font-size: 16px;
        }
        .search { 
            display: flex; 
            justify-content: center; 
            margin-bottom: 40px; 
            gap: 10px;
        }
        .search input { 
            width: 400px; 
            max-width: 100%;
            padding: 12px 20px; 
            border: 2px solid rgba(102, 126, 234, 0.3);
            background: rgba(255, 255, 255, 0.05);
            border-radius: 25px;
            color: white;
            font-size: 14px;
            transition: 0.3s;
        }
        .search input:focus { 
            outline: none;
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
        }
        .search button { 
            padding: 12px 25px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; 
            border: none; 
            cursor: pointer; 
            border-radius: 25px;
            font-weight: 600;
            transition: 0.3s;
        }
        .search button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); 
            gap: 25px; 
            padding: 40px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        .card { 
            background: rgba(102, 126, 234, 0.1);
            border: 1px solid rgba(102, 126, 234, 0.3);
            padding: 25px; 
            border-radius: 15px; 
            text-align: center; 
            cursor: pointer; 
            transition: 0.3s; 
        }
        .card:hover { 
            transform: translateY(-10px);
            background: rgba(102, 126, 234, 0.2);
            border-color: #667eea;
            box-shadow: 0 20px 40px rgba(102, 126, 234, 0.2);
        }
        .card-emoji { 
            font-size: 60px; 
            margin-bottom: 15px; 
        }
        .card h3 { 
            margin-bottom: 8px;
            font-size: 20px;
        }
        .card p { 
            color: #cbd5e1; 
            font-size: 13px; 
            margin-bottom: 10px; 
        }
        .card button { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            width: 100%; 
            font-weight: 600;
            transition: 0.3s;
            margin-top: 10px;
        }
        .card button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        footer { 
            text-align: center; 
            padding: 40px; 
            color: #64748b;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        @media (max-width: 768px) {
            .search input { width: 100%; }
            .hero h1 { font-size: 32px; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">🏛️ Heritage AR</div>
    <nav>
        <a href="index.html">← Home</a>
    </nav>
</header>

<section class="hero">
    <h1>📱 AR Monument Viewer</h1>
    <p>Select a monument to view it in Augmented Reality</p>
</section>

<div class="search">
    <input type="text" id="searchInput" placeholder="Search monument...">
    <button onclick="searchMonument()">🔍 Search</button>
</div>

<div class="grid" id="monumentGrid">
    <p style="text-align: center; color: #cbd5e1;">Loading monuments...</p>
</div>

<footer>Heritage AR • Immersive Monument Explorer</footer>

<script>
    let allMonuments = [];

    window.addEventListener('DOMContentLoaded', async () => {
        try {
            const response = await fetch('/data/monuments.json');
            const data = await response.json();
            allMonuments = data;
            console.log('AR Page: Loaded', allMonuments.length, 'monuments');
            renderMonuments(allMonuments);
        } catch (error) {
            console.error('Error:', error);
            document.getElementById('monumentGrid').innerHTML = '<p style="color: red;">Error loading monuments</p>';
        }
    });

    function renderMonuments(monuments) {
        const grid = document.getElementById('monumentGrid');
        
        if (monuments.length === 0) {
            grid.innerHTML = '<p style="text-align: center; color: #cbd5e1;">No monuments found</p>';
            return;
        }

        grid.innerHTML = monuments.map((m, idx) => `
            <div class="card">
                <div class="card-emoji">${getEmoji(m.name)}</div>
                <h3>${m.name}</h3>
                <p>📍 ${m.location}</p>
                <p>📅 ${m.year}</p>
                <button onclick="launchAR(${idx})">📱 Launch AR</button>
            </div>
        `).join('');
    }

    function getEmoji(name) {
        const emojis = {
            'Taj Mahal': '🕌', 
            'Colosseum': '🏛️', 
            'Eiffel Tower': '🗼',
            'Great Wall': '🧱', 
            'Big Ben': '🕰️', 
            'Acropolis': '⛩️',
            'Angkor': '🏯', 
            'Liberty Island': '🗽', 
            'Mont Saint-Michel': '🏰'
        };
        return emojis[name] || '🏛️';
    }

    function searchMonument() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allMonuments.filter(m =>
            m.name.toLowerCase().includes(query) || m.location.toLowerCase().includes(query)
        );
        renderMonuments(filtered);
    }

    function launchAR(index) {
        const monument = allMonuments[index];
        if (!monument.model) {
            alert('❌ GLB model not available');
            return;
        }
        window.location.href = `/ar?monument=${encodeURIComponent(monument.name)}&model=${encodeURIComponent(monument.model)}`;
    }
</script>

</body>
</html>
